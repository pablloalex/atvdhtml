<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cardápio Simples</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        .menu{
            background-color: white;
            width: 300px;
            padding: 20px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
        }

        .item{
            margin-bottom: 15px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .preco{
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="menu">

        <h1>Cardápio</h1>

        <div class="item">
            <h3>X-Burguer</h3>
            <p>Pão, carne e queijo</p>
            <p class="preco">R$ 15,00</p>
        </div>

        <div class="item">
            <h3>Batata Frita</h3>
            <p>Porção média</p>
            <p class="preco">R$ 10,00</p>
        </div>

        <div class="item">
            <h3>Refrigerante</h3>
            <p>Lata 350ml</p>
            <p class="preco">R$ 6,00</p>
        </div>

    </div>

</body>
</html>
